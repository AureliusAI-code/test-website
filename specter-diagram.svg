  <text x="428" y="248" font-family="'Courier New',monospace" font-size="8" fill="#555">composite trust index 0–100</text>

  <line x1="390" y1="262" x2="638" y2="262" stroke="rgba(255,255,255,0.035)" stroke-width="0.5"/>

  <!-- ── ROW 3: ANCHOR ── -->
  <!-- icon: chain link -->
  <path d="M396 285 Q396 277 404 277 L408 277 Q416 277 416 285 Q416 293 408 293 L404 293 Q396 293 396 285Z" fill="none" stroke="#666" stroke-width="1.2"/>
  <line x1="407" y1="281" x2="407" y2="289" stroke="#e53333" stroke-width="1"/>
  <line x1="403" y1="285" x2="411" y2="285" stroke="#e53333" stroke-width="1"/>

  <text x="428" y="280" font-family="'Courier New',monospace" font-size="10" font-weight="bold" letter-spacing="2" fill="#cccccc">ANCHOR</text>
  <text x="428" y="292" font-family="'Courier New',monospace" font-size="8" fill="#555">ERC-8004 passport · Base chain</text>
  <text x="428" y="302" font-family="'Courier New',monospace" font-size="8" fill="#555">cryptographic proof on-chain</text>

  <!-- ══════════════════════════════════════════
       CONNECTORS: engine → verdicts
  ══════════════════════════════════════════ -->
  <line x1="654" y1="220" x2="678" y2="220" stroke="#333" stroke-width="1"/>
  <circle cx="654" cy="220" r="3.5" fill="#333"/>

  <!-- branch up -->
  <line x1="678" y1="220" x2="678" y2="152" stroke="#333" stroke-width="1"/>
  <line x1="678" y1="152" x2="698" y2="152" stroke="#333" stroke-width="1"/>
  <polygon points="694,147 704,152 694,157" fill="#444"/>

  <!-- branch middle -->
  <line x1="678" y1="220" x2="698" y2="220" stroke="#333" stroke-width="1"/>
  <polygon points="694,215 704,220 694,225" fill="#444"/>

  <!-- branch down -->
  <line x1="678" y1="220" x2="678" y2="288" stroke="#333" stroke-width="1"/>
  <line x1="678" y1="288" x2="698" y2="288" stroke="#333" stroke-width="1"/>
  <polygon points="694,283 704,288 694,293" fill="#444"/>

  <!-- ══════════════════════════════════════════
       VERDICT BOXES
  ══════════════════════════════════════════ -->

  <!-- TRUSTED_AGENT -->
  <rect x="706" y="126" width="148" height="52" rx="1" fill="rgba(34,197,94,0.05)" stroke="rgba(34,197,94,0.3)" stroke-width="1"/>
  <!-- check -->
  <path d="M720 152 L726 158 L738 144" stroke="#22c55e" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="748" y="147" font-family="'Courier New',monospace" font-size="10" font-weight="bold" letter-spacing="1.5" fill="#22c55e">TRUSTED</text>
  <text x="748" y="161" font-family="'Courier New',monospace" font-size="8" fill="#2d6b44">score 85–100</text>
  <text x="748" y="171" font-family="'Courier New',monospace" font-size="7" fill="#1e4a2e">safe to transact</text>

  <!-- REVIEW_ADVISED -->
  <rect x="706" y="194" width="148" height="52" rx="1" fill="rgba(245,158,11,0.05)" stroke="rgba(245,158,11,0.3)" stroke-width="1"/>
  <!-- pause bars -->
  <rect x="719" y="210" width="5" height="18" rx="0" fill="#f59e0b"/>
  <rect x="727" y="210" width="5" height="18" rx="0" fill="#f59e0b"/>
  <text x="748" y="215" font-family="'Courier New',monospace" font-size="10" font-weight="bold" letter-spacing="1.5" fill="#f59e0b">REVIEW</text>
  <text x="748" y="229" font-family="'Courier New',monospace" font-size="8" fill="#7a5c10">score 65–84</text>
  <text x="748" y="239" font-family="'Courier New',monospace" font-size="7" fill="#5a4410">proceed with caution</text>

  <!-- HIGH_RISK -->
  <rect x="706" y="262" width="148" height="52" rx="1" fill="rgba(229,51,51,0.07)" stroke="rgba(229,51,51,0.35)" stroke-width="1"/>
  <!-- X -->
  <line x1="719" y1="273" x2="733" y2="303" stroke="#e53333" stroke-width="2" stroke-linecap="round"/>
  <line x1="733" y1="273" x2="719" y2="303" stroke="#e53333" stroke-width="2" stroke-linecap="round"/>
  <text x="748" y="283" font-family="'Courier New',monospace" font-size="10" font-weight="bold" letter-spacing="1.5" fill="#e53333">HIGH RISK</text>
  <text x="748" y="297" font-family="'Courier New',monospace" font-size="8" fill="#6e2a2a">score 0–64</text>
  <text x="748" y="307" font-family="'Courier New',monospace" font-size="7" fill="#4e1e1e">do not delegate</text>

  <!-- ══════════════════════════════════════════
       CONNECTOR → PASSPORT
  ══════════════════════════════════════════ -->
  <line x1="854" y1="152" x2="870" y2="152" stroke="#333" stroke-width="1"/>
  <line x1="870" y1="152" x2="870" y2="220" stroke="#333" stroke-width="1"/>
  <line x1="854" y1="220" x2="870" y2="220" stroke="#333" stroke-width="1"/>
  <line x1="854" y1="288" x2="870" y2="288" stroke="#333" stroke-width="1"/>
  <line x1="870" y1="288" x2="870" y2="220" stroke="#333" stroke-width="1"/>
  <line x1="870" y1="220" x2="888" y2="220" stroke="#333" stroke-width="1"/>
  <polygon points="884,215 894,220 884,225" fill="#444"/>

  <!-- ══════════════════════════════════════════
       PASSPORT RECEIPT NODE
  ══════════════════════════════════════════ -->
  <rect x="896" y="180" width="112" height="80" fill="none" stroke="#252525" stroke-width="1"/>
  <rect x="896" y="180" width="112" height="16" fill="#111"/>
  <text x="952" y="191" text-anchor="middle" font-family="'Courier New',monospace" font-size="7" letter-spacing="1.5" fill="#444">OUTPUT</text>

  <!-- document icon -->
  <rect x="920" y="204" width="30" height="36" rx="1" fill="none" stroke="#444" stroke-width="1"/>
  <rect x="920" y="204" width="30" height="1" fill="rgba(229,51,51,0.4)"/>
  <line x1="926" y1="212" x2="944" y2="212" stroke="#333" stroke-width="0.8"/>
  <line x1="926" y1="217" x2="944" y2="217" stroke="#333" stroke-width="0.8"/>
  <line x1="926" y1="222" x2="938" y2="222" stroke="#333" stroke-width="0.8"/>
  <!-- seal -->
  <circle cx="940" cy="231" r="4" fill="none" stroke="#e53333" stroke-width="1"/>
  <circle cx="940" cy="231" r="1.5" fill="#e53333"/>

  <text x="960" y="218" font-family="'Courier New',monospace" font-size="9" letter-spacing="1" fill="#777">ERC-8004</text>
  <text x="960" y="230" font-family="'Courier New',monospace" font-size="9" letter-spacing="1" fill="#777">PASSPORT</text>
  <text x="960" y="244" font-family="'Courier New',monospace" font-size="7" fill="#3a3a3a">signed · onchain</text>
  <text x="960" y="254" font-family="'Courier New',monospace" font-size="7" fill="#3a3a3a">Base mainnet</text>

  <!-- ══════════════════════════════════════════
       BOTTOM STRIP
  ══════════════════════════════════════════ -->
  <line x1="0" y1="392" x2="1040" y2="392" stroke="#111" stroke-width="1"/>
  <text x="520" y="412" text-anchor="middle" font-family="'Courier New',monospace" font-size="8" letter-spacing="3" fill="#252525">PERMISSIONLESS  ·  NO API KEY  ·  1,000 FREE QUERIES / MONTH  ·  askspecter.lol</text>
  <text x="520" y="430" text-anchor="middle" font-family="'Courier New',monospace" font-size="7" letter-spacing="2" fill="#1e1e1e">TX_VOLUME  ·  COUNTERPARTY_DIV  ·  ACCOUNT_AGE  ·  REPAYMENT_HIST  ·  EXPLOIT_EXPOSURE  ·  PROMPT_INTEGRITY  ·  PEER_ENDORSEMENT</text>

  <!-- corner decoration -->
  <path d="M24,24 L24,14 L34,14" stroke="#1e1e1e" stroke-width="1" fill="none"/>
  <path d="M1016,24 L1016,14 L1006,14" stroke="#1e1e1e" stroke-width="1" fill="none"/>
  <path d="M24,416 L24,426 L34,426" stroke="#1e1e1e" stroke-width="1" fill="none"/>
  <path d="M1016,416 L1016,426 L1006,426" stroke="#1e1e1e" stroke-width="1" fill="none"/>
</svg>
