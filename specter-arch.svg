  <rect x="60" y="116" width="3" height="56" fill="url(#redGrad)"/>
  <!-- prompt -->
  <text x="82" y="140" font-size="11" fill="#e53333" font-weight="bold">›</text>
  <text x="98" y="140" font-size="11" fill="#666">specter.score(</text>
  <text x="207" y="140" font-size="11" fill="#f0f0f0" font-family="'Courier New', monospace">0xd8dA6BF26964aF9D7eEd9e03E53415D37aA96045</text>
  <text x="638" y="140" font-size="11" fill="#666">)</text>
  <text x="82" y="157" font-size="9" fill="#333" letter-spacing="1">ETHEREUM ADDRESS  ·  BASE EVM  ·  0x-PREFIXED  ·  40 HEX CHARS</text>
  <!-- badge -->
  <rect x="764" y="124" width="68" height="18" rx="1" fill="rgba(229,51,51,0.08)" stroke="rgba(229,51,51,0.2)" stroke-width="1"/>
  <text x="798" y="136" text-anchor="middle" font-size="8" fill="#e53333" letter-spacing="1">BASE · EVM</text>

