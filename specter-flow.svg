<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="440" viewBox="0 0 1040 440">
  <defs>
    <!-- grid pattern -->
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="0.5"/>
    </pattern>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ── BACKGROUND ── -->
  <rect width="1040" height="440" fill="#090909"/>
  <rect width="1040" height="440" fill="url(#grid)"/>

  <!-- subtle red vignette center -->
  <radialGradient id="vgn" cx="52%" cy="50%" r="55%">
    <stop offset="0%" stop-color="rgba(200,255,0,0.04)"/>
    <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
  </radialGradient>
  <rect width="1040" height="440" fill="url(#vgn)"/>

  <!-- ── LEFT — TITLE ── -->
  <!-- SPECTER big word -->
  <text x="44" y="170" font-family="'Arial Black', 'Impact', sans-serif" font-weight="900" font-size="88" letter-spacing="-2" fill="#f0f0f0">SPECTER</text>
  <!-- underline accent -->
  <rect x="44" y="182" width="200" height="3" fill="#c8ff00"/>
  <!-- subtitle -->
  <text x="44" y="220" font-family="'Courier New', monospace" font-size="13" letter-spacing="3" fill="#888">KNOW YOUR</text>
  <text x="44" y="240" font-family="'Courier New', monospace" font-size="13" letter-spacing="3" fill="#888">AI AGENT</text>

  <!-- ── AGENT ADDRESS NODE ── -->
  <!-- connector line from node to boundary -->
  <line x1="356" y1="220" x2="392" y2="220" stroke="#555" stroke-width="1"/>
  <circle cx="361" cy="220" r="4" fill="#555"/>
  <!-- arrowhead -->
  <polygon points="389,215 399,220 389,225" fill="#555"/>

  <!-- node box -->
  <rect x="270" y="182" width="88" height="76" rx="1" fill="none" stroke="#333" stroke-width="1"/>
  <!-- terminal icon -->
  <rect x="296" y="192" width="36" height="26" rx="1" fill="none" stroke="#555" stroke-width="1"/>
  <line x1="300" y1="200" x2="314" y2="200" stroke="#c8ff00" stroke-width="1.2"/>
  <line x1="300" y1="205" x2="310" y2="205" stroke="#555" stroke-width="1"/>
  <line x1="300" y1="210" x2="326" y2="210" stroke="#555" stroke-width="1"/>

  <text x="314" y="236" text-anchor="middle" font-family="'Courier New', monospace" font-size="9" letter-spacing="1.5" fill="#888">AGENT</text>
  <text x="314" y="248" text-anchor="middle" font-family="'Courier New', monospace" font-size="9" letter-spacing="1.5" fill="#888">ADDRESS</text>
  <text x="314" y="262" text-anchor="middle" font-family="'Courier New', monospace" font-size="7" fill="#444">any 0x query</text>

  <!-- ── CENTER — SPECTER BOUNDARY BOX ── -->
  <!-- dashed border box -->
  <rect x="400" y="100" width="260" height="240" rx="2" fill="rgba(200,255,0,0.02)" stroke="#c8ff00" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- header of box -->
  <text x="530" y="126" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" letter-spacing="2.5" fill="#c8ff00">SPECTER ENGINE</text>
  <text x="530" y="141" text-anchor="middle" font-family="'Courier New', monospace" font-size="8" letter-spacing="2" fill="#555">SCORE BEFORE TRUST</text>
  <line x1="416" y1="148" x2="644" y2="148" stroke="rgba(200,255,0,0.2)" stroke-width="0.5"/>

  <!-- SCAN row -->
  <!-- shield icon -->
  <path d="M422 168 L422 178 L430 183 L438 178 L438 168 L430 165 Z" fill="none" stroke="#888" stroke-width="1.2"/>
  <path d="M426 174 L429 177 L434 171" fill="none" stroke="#888" stroke-width="1.2"/>
  <text x="448" y="170" font-family="'Courier New', monospace" font-size="10" font-weight="bold" letter-spacing="1.5" fill="#cccccc">SCAN</text>
  <text x="448" y="182" font-family="'Courier New', monospace" font-size="8" fill="#555">on-chain behavioral</text>
  <text x="448" y="192" font-family="'Courier New', monospace" font-size="8" fill="#555">audit across 4 chains</text>

  <!-- divider -->
  <line x1="416" y1="204" x2="644" y2="204" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>

  <!-- SCORE row -->
  <!-- score icon (bar chart) -->
  <rect x="422" y="218" width="5" height="12" fill="none" stroke="#888" stroke-width="1"/>
  <rect x="429" y="213" width="5" height="17" fill="none" stroke="#888" stroke-width="1"/>
  <rect x="436" y="208" width="5" height="22" fill="none" stroke="#888" stroke-width="1"/>
  <text x="448" y="222" font-family="'Courier New', monospace" font-size="10" font-weight="bold" letter-spacing="1.5" fill="#cccccc">SCORE</text>
  <text x="448" y="234" font-family="'Courier New', monospace" font-size="8" fill="#555">7-dimensional vector</text>
  <text x="448" y="244" font-family="'Courier New', monospace" font-size="8" fill="#555">computed deterministically</text>

  <!-- divider -->
  <line x1="416" y1="258" x2="644" y2="258" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>

  <!-- ANCHOR row -->
  <!-- shield/chain icon -->
  <path d="M422 273 L422 283 L430 288 L438 283 L438 273 L430 270 Z" fill="none" stroke="#888" stroke-width="1.2"/>
  <line x1="427" y1="278" x2="433" y2="278" stroke="#888" stroke-width="1"/>
  <line x1="430" y1="275" x2="430" y2="281" stroke="#888" stroke-width="1"/>
  <text x="448" y="276" font-family="'Courier New', monospace" font-size="10" font-weight="bold" letter-spacing="1.5" fill="#cccccc">ANCHOR</text>
  <text x="448" y="288" font-family="'Courier New', monospace" font-size="8" fill="#555">ERC-8004 proof written</text>
  <text x="448" y="298" font-family="'Courier New', monospace" font-size="8" fill="#555">to Robinhood Network</text>

  <!-- ── CONNECTOR OUT — boundary to outputs ── -->
  <!-- main horizontal out line -->
  <line x1="660" y1="220" x2="696" y2="220" stroke="#555" stroke-width="1"/>
  <circle cx="660" cy="220" r="4" fill="#555"/>

  <!-- branch up to TRUSTED -->
  <line x1="696" y1="220" x2="696" y2="154" stroke="#555" stroke-width="1"/>
  <line x1="696" y1="154" x2="720" y2="154" stroke="#555" stroke-width="1"/>
  <polygon points="717,149 727,154 717,159" fill="#555"/>

  <!-- branch middle to REVIEW -->
  <line x1="696" y1="220" x2="720" y2="220" stroke="#555" stroke-width="1"/>
  <polygon points="717,215 727,220 717,225" fill="#555"/>

  <!-- branch down to DENY -->
  <line x1="696" y1="220" x2="696" y2="286" stroke="#555" stroke-width="1"/>
  <line x1="696" y1="286" x2="720" y2="286" stroke="#555" stroke-width="1"/>
  <polygon points="717,281 727,286 717,291" fill="#555"/>

  <!-- ── OUTPUT NODES ── -->

  <!-- TRUSTED (green) -->
  <rect x="728" y="130" width="140" height="48" rx="1" fill="rgba(34,197,94,0.06)" stroke="rgba(34,197,94,0.35)" stroke-width="1"/>
  <!-- checkmark -->
  <path d="M742 154 L747 159 L758 148" fill="none" stroke="#22c55e" stroke-width="2" stroke-linecap="round"/>
  <text x="768" y="152" font-family="'Courier New', monospace" font-size="11" font-weight="bold" letter-spacing="1.5" fill="#22c55e">TRUSTED</text>
  <text x="768" y="167" font-family="'Courier New', monospace" font-size="8" fill="#2a6e42">score 85–100 · safe to act</text>

  <!-- REVIEW (amber) -->
  <rect x="728" y="196" width="140" height="48" rx="1" fill="rgba(245,158,11,0.06)" stroke="rgba(245,158,11,0.35)" stroke-width="1"/>
  <!-- pause icon -->
  <rect x="740" y="208" width="5" height="16" rx="0" fill="#f59e0b"/>
  <rect x="748" y="208" width="5" height="16" rx="0" fill="#f59e0b"/>
  <text x="764" y="218" font-family="'Courier New', monospace" font-size="11" font-weight="bold" letter-spacing="1.5" fill="#f59e0b">REVIEW</text>
  <text x="764" y="233" font-family="'Courier New', monospace" font-size="8" fill="#6b5010">score 65–84 · verify first</text>

  <!-- DENY (red) -->
  <rect x="728" y="262" width="140" height="48" rx="1" fill="rgba(200,255,0,0.08)" stroke="rgba(200,255,0,0.4)" stroke-width="1"/>
  <!-- X icon -->
  <line x1="740" y1="276" x2="753" y2="299" stroke="#c8ff00" stroke-width="2" stroke-linecap="round"/>
  <line x1="753" y1="276" x2="740" y2="299" stroke="#c8ff00" stroke-width="2" stroke-linecap="round"/>
  <text x="764" y="284" font-family="'Courier New', monospace" font-size="11" font-weight="bold" letter-spacing="1.5" fill="#c8ff00">DENY</text>
  <text x="764" y="299" font-family="'Courier New', monospace" font-size="8" fill="#6e2a2a">score 0–64 · do not trust</text>

  <!-- ── CONNECTOR TO PASSPORT ── -->
  <!-- lines from outputs to passport -->
  <line x1="868" y1="154" x2="884" y2="154" stroke="#555" stroke-width="1"/>
  <line x1="884" y1="154" x2="884" y2="220" stroke="#555" stroke-width="1"/>
  <line x1="868" y1="220" x2="884" y2="220" stroke="#555" stroke-width="1"/>
  <line x1="868" y1="286" x2="884" y2="286" stroke="#555" stroke-width="1"/>
  <line x1="884" y1="286" x2="884" y2="220" stroke="#555" stroke-width="1"/>
  <line x1="884" y1="220" x2="900" y2="220" stroke="#555" stroke-width="1"/>
  <polygon points="897,215 907,220 897,225" fill="#555"/>

  <!-- ── PASSPORT RECEIPT ── -->
  <rect x="908" y="182" width="112" height="76" rx="1" fill="none" stroke="#333" stroke-width="1"/>
  <!-- document icon -->
  <rect x="931" y="193" width="28" height="32" rx="1" fill="none" stroke="#666" stroke-width="1"/>
  <line x1="936" y1="201" x2="954" y2="201" stroke="#444" stroke-width="1"/>
  <line x1="936" y1="207" x2="954" y2="207" stroke="#444" stroke-width="1"/>
  <line x1="936" y1="213" x2="948" y2="213" stroke="#444" stroke-width="1"/>
  <!-- seal dot -->
  <circle cx="951" cy="217" r="3" fill="none" stroke="#c8ff00" stroke-width="1"/>

  <text x="964" y="236" text-anchor="middle" font-family="'Courier New', monospace" font-size="9" letter-spacing="1.5" fill="#888">PASSPORT</text>
  <text x="964" y="249" text-anchor="middle" font-family="'Courier New', monospace" font-size="7" fill="#444">ERC-8004 proof</text>
  <text x="964" y="260" text-anchor="middle" font-family="'Courier New', monospace" font-size="7" fill="#444">anchored onchain</text>

  <!-- ── BOTTOM LABEL / WATERMARK ── -->
  <text x="520" y="390" text-anchor="middle" font-family="'Courier New', monospace" font-size="9" letter-spacing="3" fill="#222">PERMISSIONLESS  ·  NO API KEY  ·  UPDATES EVERY 15 MIN  ·  askspecter.lol</text>

</svg>
