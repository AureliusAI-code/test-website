<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1100" viewBox="0 0 900 1100" font-family="'Courier New', monospace">
  <defs>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e53333;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#ff6666;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f0f;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#080808;stop-opacity:1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="subtleglow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- scanline pattern -->
    <pattern id="scanlines" x="0" y="0" width="1" height="4" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="1" height="2" fill="rgba(229,51,51,0.015)"/>
    </pattern>
  </defs>

  <!-- background -->
  <rect width="900" height="1100" fill="url(#bgGrad)"/>
  <rect width="900" height="1100" fill="url(#scanlines)"/>

  <!-- subtle red glow top right -->
  <ellipse cx="820" cy="120" rx="200" ry="180" fill="rgba(229,51,51,0.04)"/>

  <!-- ─── HEADER ─── -->
  <text x="450" y="48" text-anchor="middle" font-family="'Arial Black', sans-serif" font-weight="900" font-size="22" letter-spacing="6" fill="url(#redGrad)" filter="url(#subtleglow)">SPECTER PROTOCOL</text>
  <text x="450" y="70" text-anchor="middle" font-size="10" letter-spacing="3" fill="#444">KNOW YOUR AGENT  ·  ARCHITECTURE  ·  v1.0</text>
  <line x1="60" y1="82" x2="840" y2="82" stroke="#1a1a1a" stroke-width="1"/>

