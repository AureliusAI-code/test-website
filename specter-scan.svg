  <path d="M1040,0 L988,0 M1040,0 L1040,52" stroke="#181818" stroke-width="1" fill="none"/>
  <path d="M0,440 L52,440 M0,440 L0,388" stroke="#181818" stroke-width="1" fill="none"/>

